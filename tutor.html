<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySIKA Ultimate Deployment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Chosen Palette: Modern Dark Tech (Slate, Cyan, Emerald, Indigo) -->
    <!-- Application Structure Plan: Dashboard interaktif bergaya IDE/DevOps tools. Menggunakan layout split-screen: Sidebar untuk navigasi dan tracking progress, Area Utama untuk eksekusi instruksi. Setiap blok kode dilengkapi badge lokasi (VPS/GitHub/Lokal) agar user tidak bingung di mana harus mengeksekusi perintah. Progress divisualisasikan secara real-time. -->
    <!-- Visualization & Content Choices: 
         - Goal: Track Progress -> Viz: Doughnut Chart (Chart.js) -> Interaction: Update dinamis saat checkbox diklik -> Justification: Gamifikasi proses deployment yang panjang agar tidak membosankan -> Library: Chart.js Canvas.
         - Goal: Organize Execution -> Viz: Tagging lokasi (Terminal, Web, Lokal) dengan badge warna -> Justification: Mencegah error fatal akibat salah tempat eksekusi -> Method: Tailwind CSS + Unicode Icons (NO SVG).
         - Goal: Kecepatan & Akurasi -> Viz: One-click copy code blocks bergaya terminal -> Interaction: Tombol copy responsif -> Justification: Zero-typo deployment.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .chart-container { position: relative; width: 100%; max-width: 150px; margin: 0 auto; height: 150px; }
        
        /* Terminal-like Scrollbar */
        .terminal-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animation for toast */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate { animation: slideInUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- Top Navbar -->
    <header class="bg-slate-900 border-b border-slate-800 shadow-md z-20 shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-cyan-500 text-slate-900 font-black text-xl w-10 h-10 flex items-center justify-center rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.5)]">M</div>
                <div>
                    <h1 class="text-xl font-bold text-slate-100 tracking-tight">MySIKA <span class="text-cyan-400 font-light">DeployOps</span></h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest font-mono">dandienter/mysikea &rarr; mysika.my.id</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col items-end">
                    <span class="text-xs text-slate-400 font-mono">SYSTEM STATUS</span>
                    <span id="statusText" class="text-sm font-bold text-amber-400">DEPLOYING...</span>
                </div>
                <div class="h-10 w-10 relative">
                    <canvas id="miniProgressChart"></canvas>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex-grow flex overflow-hidden">
        
        <!-- Sidebar Navigation -->
        <aside class="w-80 bg-slate-100 border-r border-slate-200 flex flex-col shrink-0 overflow-y-auto">
            <div class="p-6 pb-2">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Deployment Pipeline</h2>
            </div>
            <nav class="flex-1 px-4 pb-6">
                <ul id="stepNavList" class="space-y-1.5">
                    <!-- Nav items injected here -->
                </ul>
            </nav>
            <div class="p-6 bg-slate-200/50 border-t border-slate-200 mt-auto">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-slate-700">Total Progress</span>
                    <span id="progressPercentage" class="text-sm font-black text-cyan-600">0%</span>
                </div>
                <div class="w-full bg-slate-300 rounded-full h-2 overflow-hidden">
                    <div id="progressBar" class="bg-cyan-500 h-2 rounded-full transition-all duration-500 w-0 shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 bg-white overflow-y-auto relative scroll-smooth" id="mainScrollArea">
            <div class="max-w-4xl mx-auto p-8 pb-24">
                
                <!-- Dynamic Content Wrapper -->
                <div class="transition-opacity duration-300" id="contentWrapper">
                    
                    <div class="flex items-center gap-3 mb-6">
                        <span id="stepNumberBadge" class="bg-slate-800 text-cyan-400 font-mono font-bold px-3 py-1 rounded text-sm shadow-sm">STEP 1</span>
                        <h2 id="contentTitle" class="text-3xl font-extrabold text-slate-900 tracking-tight">Memuat...</h2>
                    </div>

                    <!-- Environment Badge -->
                    <div id="envBadgeContainer" class="mb-8"></div>

                    <!-- Description -->
                    <div id="contentDescription" class="text-lg text-slate-600 leading-relaxed mb-8 border-l-4 border-slate-200 pl-4"></div>

                    <!-- Blocks Container -->
                    <div id="contentBlocks" class="space-y-6">
                        <!-- Code and text blocks injected here -->
                    </div>

                    <!-- Action Bar -->
                    <div class="mt-12 pt-6 border-t border-slate-100 flex items-center justify-between bg-slate-50 p-6 rounded-xl border">
                        <div>
                            <p class="text-sm font-bold text-slate-800">Verifikasi Tahap Ini</p>
                            <p class="text-xs text-slate-500 mt-1">Tandai selesai untuk melanjutkan ke tahap berikutnya.</p>
                        </div>
                        <label class="flex items-center cursor-pointer relative">
                            <input type="checkbox" id="stepCompleteCheckbox" class="peer sr-only">
                            <div class="w-14 h-8 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500 shadow-inner"></div>
                            <span class="ml-3 text-sm font-bold text-slate-600 peer-checked:text-emerald-600 uppercase tracking-wider transition-colors" id="toggleLabelText">Tertunda</span>
                        </label>
                    </div>

                    <!-- Next Button -->
                    <div class="mt-6 flex justify-end" id="nextBtnContainer">
                        <button onclick="goToNextStep()" class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-all flex items-center gap-2">
                            Langkah Selanjutnya <span>&rarr;</span>
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script>
        // --- DATA ARCHITECTURE ---
        // Env types: VPS (Terminal), GITHUB (Web UI), LAPTOP (Local IDE/Code)
        
        const envConfig = {
            'VPS': { label: '&#128421; Eksekusi di Terminal VPS', color: 'bg-indigo-100 text-indigo-800 border-indigo-200' },
            'GITHUB': { label: '&#127760; Eksekusi di Web GitHub', color: 'bg-slate-800 text-slate-100 border-slate-700' },
            'LAPTOP': { label: '&#128187; Eksekusi di Laptop / Lokal', color: 'bg-emerald-100 text-emerald-800 border-emerald-200' },
            'MIXED': { label: '&#9881; Eksekusi Campuran (Ikuti Instruksi)', color: 'bg-amber-100 text-amber-800 border-amber-200' }
        };

        const deploymentSteps = [
            {
                id: 1,
                title: "Optimasi VPS & Instalasi Runtime",
                env: "VPS",
                description: "Karena VPS hanya memiliki RAM 1GB, kita <strong>WAJIB</strong> membuat SWAP Memory agar VPS tidak <em>crash</em> saat proses kompilasi. Kita juga menginstal Node.js versi 20 dan Tesseract OCR.",
                blocks: [
                    { type: 'text', content: "Jalankan skrip ini sekaligus di Terminal VPS Anda:" },
                    { type: 'code', language: 'bash', content: "# 1. Update OS & Install Dependencies\nsudo apt-get update && sudo apt-get upgrade -y\nsudo apt-get install -y tesseract-ocr libtesseract-dev git python3-pip\n\n# 2. Buat SWAP 2GB (Sangat Penting!)\nsudo fallocate -l 2G /swapfile\nsudo chmod 600 /swapfile\nsudo mkswap /swapfile\nsudo swapon /swapfile\necho '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab\n\n# 3. Install NVM & Node.js 20\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash\nexport NVM_DIR=\"$HOME/.nvm\"\n[ -s \"$NVM_DIR/nvm.sh\" ] && \\. \"$NVM_DIR/nvm.sh\"\nnvm install 20\nnvm use 20\nnode -v # Pastikan outputnya v20.x.x" }
                ],
                completed: false
            },
            {
                id: 2,
                title: "Otentikasi SSH GitHub",
                env: "MIXED",
                description: "Menghubungkan VPS dengan akun GitHub Anda agar proses tarik kode (<code>git pull</code>) dapat berjalan otomatis tanpa meminta password.",
                blocks: [
                    { type: 'badge', text: 'Di Terminal VPS' },
                    { type: 'text', content: "Buat kunci SSH baru (tekan Enter terus saat ditanya passhrase/password):" },
                    { type: 'code', language: 'bash', content: "ssh-keygen -t ed25519 -C \"vps-mysika\"\ncat ~/.ssh/id_ed25519.pub" },
                    { type: 'text', content: "Salin seluruh teks <code>ssh-ed25519 ... vps-mysika</code> yang muncul di layar." },
                    { type: 'badge', text: 'Di Web GitHub' },
                    { type: 'text', content: "1. Buka repositori <strong>dandienter/mysikea</strong>.<br>2. Ke <strong>Settings</strong> > <strong>Deploy Keys</strong> > <strong>Add deploy key</strong>.<br>3. Paste kunci tadi, beri nama 'VPS-Prod', dan <strong>centang 'Allow write access'</strong>.<br>4. Klik Save." },
                    { type: 'badge', text: 'Di Terminal VPS' },
                    { type: 'text', content: "Verifikasi koneksi agar VPS mempercayai GitHub:" },
                    { type: 'code', language: 'bash', content: "ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts\nssh -T git@github.com\n# Harus muncul: Hi dandienter! You've successfully authenticated..." }
                ],
                completed: false
            },
            {
                id: 3,
                title: "Setup Project & Environment",
                env: "VPS",
                description: "Mengkloning repository dari GitHub dan menyetel URL Backend agar Frontend React terhubung ke domain yang benar (<code>mysika.my.id</code>).",
                blocks: [
                    { type: 'text', content: "Kloning repo dan buat file konfigurasi environment:" },
                    { type: 'code', language: 'bash', content: "cd ~\ngit clone git@github.com:dandienter/mysikea.git\ncd mysikea/frontend\n\n# Membuat dan mengisi file .env\necho \"REACT_APP_BACKEND_URL=https://mysika.my.id\" > .env\n\n# Verifikasi isi file\ncat .env" }
                ],
                completed: false
            },
            {
                id: 4,
                title: "Deploy FastAPI Service",
                env: "VPS",
                description: "Menjadikan backend FastAPI sebagai <em>Systemd Service</em> agar otomatis berjalan di <em>background</em> dan <em>auto-restart</em> jika VPS di-reboot.",
                blocks: [
                    { type: 'text', content: "Salin dan jalankan seluruh blok perintah ini sekaligus. Ini akan membuat file service dan langsung menyalakannya:" },
                    { type: 'code', language: 'bash', content: "sudo bash -c 'cat > /etc/systemd/system/fastapi.service << EOF\n[Unit]\nDescription=FastAPI MySIKA Production Service\nAfter=network.target\n\n[Service]\nUser=ubuntu\nGroup=ubuntu\nWorkingDirectory=/home/ubuntu/mysikea/backend\nExecStart=/usr/local/bin/uvicorn server:app --host 127.0.0.1 --port 8000 --proxy-headers --forwarded-allow-ips=\"*\"\nRestart=always\nRestartSec=3\n\n[Install]\nWantedBy=multi-user.target\nEOF'\n\n# Aktifkan service\nsudo systemctl daemon-reload\nsudo systemctl enable fastapi\nsudo systemctl start fastapi\nsudo systemctl status fastapi --no-pager" }
                ],
                completed: false
            },
            {
                id: 5,
                title: "Konfigurasi Cloudflare Tunnel",
                env: "VPS",
                description: "Menghubungkan aplikasi yang berjalan di localhost:8000 langsung ke domain <code>mysika.my.id</code> secara aman tanpa membuka port firewall.",
                blocks: [
                    { type: 'text', content: "1. Install Cloudflared:" },
                    { type: 'code', language: 'bash', content: "curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb\nsudo dpkg -i cloudflared.deb\ncloudflared tunnel login" },
                    { type: 'text', content: "Buka link yang muncul di terminal pada browser Anda, lalu pilih domain mysika.my.id." },
                    { type: 'text', content: "2. Buat tunnel dan routing (<strong>Ganti &lt;ID_TUNNEL_KAMU&gt; dengan ID asli yang muncul di langkah create</strong>):" },
                    { type: 'code', language: 'bash', content: "cloudflared tunnel create mysika-prod\n# CATAT ID-NYA!\n\ncloudflared tunnel route dns mysika-prod mysika.my.id" },
                    { type: 'text', content: "3. Buat file konfigurasi ingress:" },
                    { type: 'code', language: 'bash', content: "mkdir -p ~/.cloudflared\ncat > ~/.cloudflared/config.yml << EOF\ntunnel: <ID_TUNNEL_KAMU>\ncredentials-file: /home/ubuntu/.cloudflared/<ID_TUNNEL_KAMU>.json\n\ningress:\n  - hostname: mysika.my.id\n    service: http://localhost:8000\n  - service: http_status:404\nEOF" },
                    { type: 'text', content: "4. Install sebagai service:" },
                    { type: 'code', language: 'bash', content: "sudo cloudflared service install\nsudo systemctl start cloudflared\nsudo systemctl enable cloudflared" }
                ],
                completed: false
            },
            {
                id: 6,
                title: "Integrasi Auto-Deploy (CI/CD)",
                env: "LAPTOP",
                description: "Skrip GitHub Actions yang sudah <strong>dioptimalkan</strong>. Skrip ini menggunakan <code>--no-audit --no-fund</code> agar npm install jauh lebih cepat di VPS.",
                blocks: [
                    { type: 'text', content: "<strong>Di Web GitHub:</strong> Buka Repo > Settings > Secrets and variables > Actions. Tambahkan 3 secret:\n1. <code>VPS_HOST</code> (Isi IP VPS)\n2. <code>VPS_USERNAME</code> (Isi: ubuntu)\n3. <code>VPS_PASSWORD</code> (Isi password SSH)" },
                    { type: 'text', content: "<strong>Di Laptop/Lokal (VS Code):</strong> Buat file di path <code>.github/workflows/deploy.yml</code> lalu masukkan kode berikut:" },
                    { type: 'code', language: 'yaml', content: "name: Fast Deploy MySIKA\non:\n  push:\n    branches: [ main ]\njobs:\n  deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - name: SSH Deploy & Build\n        uses: appleboy/ssh-action@v1.0.3\n        with:\n          host: ${{ secrets.VPS_HOST }}\n          username: ${{ secrets.VPS_USERNAME }}\n          password: ${{ secrets.VPS_PASSWORD }}\n          script: |\n            # Load NVM Node 20\n            export NVM_DIR=\"$HOME/.nvm\"\n            source \"$NVM_DIR/nvm.sh\"\n            nvm use 20\n\n            cd ~/mysikea\n            echo \"🔄 Pulling changes...\"\n            git pull origin main\n\n            echo \"🐍 Fast Pip Install...\"\n            cd backend\n            pip install -r requirements.txt --disable-pip-version-check\n\n            echo \"📦 Fast NPM Install & Build...\"\n            cd ../frontend\n            npm install ajv@^8 ajv-keywords@^5 --legacy-peer-deps --no-audit --no-fund\n            npm install --legacy-peer-deps --no-audit --no-fund\n            CI=false npm run build\n\n            echo \"📂 Syncing Artifacts...\"\n            rm -rf ~/mysikea/backend/static\n            mv build ~/mysikea/backend/static\n\n            echo \"🚀 Restarting FastAPI...\"\n            sudo systemctl restart fastapi\n            echo \"✅ Deployment Complete!\"" },
                    { type: 'text', content: "Lakukan commit dan push file tersebut ke GitHub. Web Anda akan otomatis terupdate dalam ~3 menit!" }
                ],
                completed: false
            }
        ];

        let currentStepId = 1;
        let progressChartInstance = null;

        // --- CORE LOGIC ---

        function initApp() {
            renderNavigation();
            renderStep(currentStepId);
            initChart();
            updateProgress();
            
            // Toggle complete listener
            document.getElementById('stepCompleteCheckbox').addEventListener('change', (e) => {
                const step = deploymentSteps.find(s => s.id === currentStepId);
                step.completed = e.target.checked;
                updateProgress();
                renderNavigation();
                
                const label = document.getElementById('toggleLabelText');
                label.innerText = step.completed ? 'Selesai' : 'Tertunda';
            });
        }

        function renderNavigation() {
            const navList = document.getElementById('stepNavList');
            navList.innerHTML = '';
            
            deploymentSteps.forEach(step => {
                const li = document.createElement('li');
                const isCurrent = step.id === currentStepId;
                
                let statusDot = step.completed ? 
                    '<div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></div>' : 
                    '<div class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>';
                
                li.className = `group flex items-center p-3 rounded-lg cursor-pointer transition-all duration-200 border-l-[3px] ${isCurrent ? 'bg-white shadow-sm border-cyan-500 ml-1' : 'hover:bg-slate-200/50 border-transparent'}`;
                li.innerHTML = `
                    <div class="mr-3 flex-shrink-0 flex items-center justify-center w-5">
                        ${statusDot}
                    </div>
                    <div class="flex-1 min-w-0">
                        <span class="${isCurrent ? 'font-bold text-cyan-700' : 'font-medium text-slate-600 group-hover:text-slate-900'} text-sm block truncate transition-colors">
                            ${step.id}. ${step.title}
                        </span>
                    </div>
                `;
                li.onclick = () => renderStep(step.id);
                navList.appendChild(li);
            });
        }

        function renderStep(id) {
            currentStepId = id;
            const step = deploymentSteps.find(s => s.id === id);
            
            // Update Header Area
            document.getElementById('stepNumberBadge').innerText = `STEP ${step.id}`;
            document.getElementById('contentTitle').innerText = step.title;
            document.getElementById('contentDescription').innerHTML = step.description;
            
            // Env Badge
            const envData = envConfig[step.env];
            document.getElementById('envBadgeContainer').innerHTML = `
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-semibold border ${envData.color}">
                    ${envData.label}
                </span>
            `;
            
            // Update Toggle State
            const checkbox = document.getElementById('stepCompleteCheckbox');
            checkbox.checked = step.completed;
            document.getElementById('toggleLabelText').innerText = step.completed ? 'Selesai' : 'Tertunda';

            // Hide Next button if it's the last step
            const nextBtn = document.getElementById('nextBtnContainer');
            nextBtn.style.display = (id === deploymentSteps.length) ? 'none' : 'flex';

            // Render Blocks
            let htmlContent = '';
            step.blocks.forEach((block, index) => {
                if (block.type === 'text') {
                    htmlContent += `<p class="text-slate-700 font-medium">${block.content}</p>`;
                } else if (block.type === 'badge') {
                    htmlContent += `<div class="inline-block bg-slate-200 text-slate-700 text-xs font-bold px-2 py-1 rounded uppercase tracking-wider border border-slate-300">${block.text}</div>`;
                } else if (block.type === 'code') {
                    const codeId = `code-block-${id}-${index}`;
                    htmlContent += `
                        <div class="relative bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 overflow-hidden my-2">
                            <div class="flex items-center justify-between px-4 py-2 bg-[#1e293b] border-b border-slate-800">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                                    <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                                    <span class="ml-2 text-xs font-mono text-slate-400 uppercase tracking-widest">${block.language}</span>
                                </div>
                                <button onclick="copyCode('${codeId}')" class="text-xs bg-slate-700 hover:bg-cyan-600 text-slate-200 hover:text-white px-3 py-1.5 rounded transition-all focus:outline-none flex items-center gap-1.5 shadow-sm font-semibold">
                                    <span>&#128203;</span> Salin Kode
                                </button>
                            </div>
                            <pre class="p-5 overflow-x-auto text-sm text-cyan-50 font-mono leading-relaxed terminal-scroll"><code id="${codeId}">${escapeHtml(block.content)}</code></pre>
                        </div>
                    `;
                }
            });
            
            document.getElementById('contentBlocks').innerHTML = htmlContent;
            
            // Smooth scroll to top of content
            document.getElementById('mainScrollArea').scrollTo(0,0);
        }

        function goToNextStep() {
            if(currentStepId < deploymentSteps.length) {
                renderStep(currentStepId + 1);
            }
        }

        window.copyCode = function(elementId) {
            const codeText = document.getElementById(elementId).innerText;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(codeText).then(() => showToast());
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = codeText;
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); showToast(); } 
                catch (err) { console.error('Fallback error', err); }
                textArea.remove();
            }
        }

        function showToast() {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 right-6 bg-cyan-600 text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center gap-3 font-semibold toast-animate border border-cyan-500';
            toast.innerHTML = `<span class="text-xl">&#10004;</span> Kode berhasil disalin!`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function initChart() {
            const ctx = document.getElementById('miniProgressChart').getContext('2d');
            progressChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Selesai', 'Sisa'],
                    datasets: [{
                        data: [0, 1],
                        backgroundColor: ['#06b6d4', '#334155'], // Cyan 500, Slate 700
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '80%',
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    animation: { animateScale: true }
                }
            });
        }

        function updateProgress() {
            const completedCount = deploymentSteps.filter(s => s.completed).length;
            const totalCount = deploymentSteps.length;
            const pendingCount = totalCount - completedCount;
            const percentage = Math.round((completedCount / totalCount) * 100);

            // Update Progress Bar & Text
            document.getElementById('progressPercentage').innerText = `${percentage}%`;
            document.getElementById('progressBar').style.width = `${percentage}%`;
            
            const statusText = document.getElementById('statusText');
            if(percentage === 100) {
                statusText.innerText = "ALL SYSTEMS GO";
                statusText.className = "text-sm font-bold text-emerald-400";
                document.getElementById('progressBar').classList.replace('bg-cyan-500', 'bg-emerald-500');
                document.getElementById('progressBar').classList.replace('shadow-[0_0_10px_rgba(6,182,212,0.8)]', 'shadow-[0_0_10px_rgba(16,185,129,0.8)]');
            } else {
                statusText.innerText = "DEPLOYING...";
                statusText.className = "text-sm font-bold text-amber-400";
                document.getElementById('progressBar').classList.replace('bg-emerald-500', 'bg-cyan-500');
                document.getElementById('progressBar').classList.replace('shadow-[0_0_10px_rgba(16,185,129,0.8)]', 'shadow-[0_0_10px_rgba(6,182,212,0.8)]');
            }

            // Update Chart Data
            if (progressChartInstance) {
                progressChartInstance.data.datasets[0].data = [completedCount, pendingCount];
                // Change chart color on 100%
                progressChartInstance.data.datasets[0].backgroundColor[0] = percentage === 100 ? '#10b981' : '#06b6d4';
                progressChartInstance.update();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
