<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySIKA Ops - Private Repo Deployment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151f32', 950: '#0b1120' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .chart-container { position: relative; width: 100%; max-width: 150px; margin: 0 auto; height: 150px; }
        
        /* Terminal-like Scrollbar */
        .terminal-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #0b1120; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animation for toast */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate { animation: slideInUp 0.3s ease-out forwards; }
        
        /* Custom glow effects */
        .glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); }
        .glow-emerald { box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 antialiased h-screen flex flex-col overflow-hidden selection:bg-cyan-500/30">

    <header class="bg-slate-900 border-b border-slate-800 z-20 shrink-0 shadow-lg">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-gradient-to-br from-cyan-400 to-blue-600 text-slate-950 font-black text-xl w-10 h-10 flex items-center justify-center rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                    Ops
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-100 tracking-tight">MySIKA <span class="text-cyan-400 font-light">Deploy Pipeline</span></h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span class="text-[10px] bg-slate-800 border border-slate-700 px-1.5 py-0.5 rounded text-slate-400 uppercase tracking-widest font-mono flex items-center gap-1">
                            <span>&#128274;</span> Private Repo
                        </span>
                        <span class="text-[10px] text-slate-500 font-mono">dandienter/mysikea &rarr; VPS</span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-5 bg-slate-850 p-2 rounded-2xl border border-slate-800 pr-4">
                <div class="hidden md:flex flex-col items-end">
                    <span class="text-[10px] text-slate-500 font-mono tracking-widest">PIPELINE STATUS</span>
                    <span id="statusText" class="text-sm font-bold text-amber-400 animate-pulse">DEPLOYING...</span>
                </div>
                <div class="h-10 w-10 relative">
                    <canvas id="miniProgressChart"></canvas>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden max-w-[1600px] mx-auto w-full">
        
        <aside class="w-80 bg-slate-900/50 border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto backdrop-blur-sm">
            <div class="p-6 pb-4 border-b border-slate-800/50">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <span>&#9881;</span> Deployment Stages
                </h2>
            </div>
            <nav class="flex-1 px-4 py-4 overflow-y-auto terminal-scroll">
                <ul id="stepNavList" class="space-y-1.5">
                    </ul>
            </nav>
            <div class="p-6 bg-slate-900 border-t border-slate-800 mt-auto shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Overall Progress</span>
                    <span id="progressPercentage" class="text-sm font-black text-cyan-400">0%</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden ring-1 ring-slate-700/50">
                    <div id="progressBar" class="bg-gradient-to-r from-cyan-500 to-blue-500 h-full rounded-full transition-all duration-700 ease-out w-0 shadow-[0_0_10px_rgba(6,182,212,0.5)]"></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-slate-950 overflow-y-auto relative scroll-smooth terminal-scroll" id="mainScrollArea">
            <div class="max-w-4xl mx-auto p-8 lg:p-12 pb-32">
                
                <div class="transition-opacity duration-300" id="contentWrapper">
                    
                    <div class="flex items-center gap-4 mb-6">
                        <span id="stepNumberBadge" class="bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 font-mono font-bold px-3 py-1 rounded-lg text-sm shadow-sm">STEP 1</span>
                        <h2 id="contentTitle" class="text-2xl sm:text-3xl font-extrabold text-slate-100 tracking-tight">Memuat...</h2>
                    </div>

                    <div id="envBadgeContainer" class="mb-8"></div>

                    <div id="contentDescription" class="text-lg text-slate-400 leading-relaxed mb-10 border-l-4 border-slate-700 pl-5"></div>

                    <div id="contentBlocks" class="space-y-8">
                        </div>

                    <div class="mt-12 pt-8 border-t border-slate-800 flex flex-col sm:flex-row items-start sm:items-center justify-between bg-slate-900/50 p-6 rounded-2xl border border-slate-800/80 glow-cyan">
                        <div class="mb-4 sm:mb-0">
                            <p class="text-base font-bold text-slate-200">Verifikasi Tahap Ini</p>
                            <p class="text-sm text-slate-500 mt-1">Tandai sebagai selesai untuk melanjutkan ke instruksi berikutnya.</p>
                        </div>
                        <label class="flex items-center cursor-pointer relative group">
                            <input type="checkbox" id="stepCompleteCheckbox" class="peer sr-only">
                            <div class="w-16 h-8 bg-slate-800 border border-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-slate-400 after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500 peer-checked:border-emerald-500 after:shadow-sm"></div>
                            <span class="ml-4 text-sm font-bold text-slate-500 peer-checked:text-emerald-400 uppercase tracking-widest transition-colors" id="toggleLabelText">Tertunda</span>
                        </label>
                    </div>

                    <div class="mt-8 flex justify-end" id="nextBtnContainer">
                        <button onclick="goToNextStep()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3.5 px-8 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.3)] hover:shadow-[0_0_20px_rgba(6,182,212,0.5)] transition-all flex items-center gap-3">
                            Langkah Selanjutnya <span class="text-xl leading-none">&rarr;</span>
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script>
        // --- DATA ARCHITECTURE ---
        // Env types: VPS (Terminal), GITHUB (Web UI), LAPTOP (Local IDE/Code)
        
        const envConfig = {
            'VPS': { label: '&#128421; Eksekusi di Terminal VPS', color: 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20' },
            'GITHUB': { label: '&#127760; Eksekusi di Web GitHub', color: 'bg-slate-800 text-slate-300 border-slate-700' },
            'LAPTOP': { label: '&#128187; Eksekusi di Laptop / Lokal', color: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' },
            'MIXED': { label: '&#9881; Eksekusi Campuran', color: 'bg-amber-500/10 text-amber-400 border-amber-500/20' }
        };

        const deploymentSteps = [
            {
                id: 1,
                title: "Optimasi VPS & Instalasi Runtime",
                env: "VPS",
                description: "Karena VPS memiliki spesifikasi terbatas (misal 1GB RAM), kita <strong>WAJIB</strong> membuat SWAP Memory agar VPS tidak <em>Crash/Out of Memory</em> saat proses kompilasi React. Kita juga menginstal Node.js versi 20 dan Tesseract OCR.",
                blocks: [
                    { type: 'text', content: "Jalankan blok skrip ini sekaligus di Terminal VPS Anda:" },
                    { type: 'code', language: 'bash', content: "# 1. Update OS & Install Dependencies\nsudo apt-get update && sudo apt-get upgrade -y\nsudo apt-get install -y tesseract-ocr libtesseract-dev git python3-pip\n\n# 2. Buat SWAP 2GB (Mencegah Crash saat Build)\nsudo fallocate -l 2G /swapfile\nsudo chmod 600 /swapfile\nsudo mkswap /swapfile\nsudo swapon /swapfile\necho '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab\n\n# 3. Install NVM & Node.js 20\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash\nexport NVM_DIR=\"$HOME/.nvm\"\n[ -s \"$NVM_DIR/nvm.sh\" ] && \\. \"$NVM_DIR/nvm.sh\"\nnvm install 20\nnvm use 20\nnode -v # Pastikan outputnya v20.x.x" }
                ],
                completed: false
            },
            {
                id: 2,
                title: "Autentikasi SSH untuk Private Repo",
                env: "MIXED",
                description: "Karena repository <code>dandienter/mysikea</code> bersifat <strong>Private</strong>, VPS tidak bisa langsung melakukan git clone. Kita harus membuat <em>SSH Key</em> di VPS dan memasukkannya sebagai <em>Deploy Key</em> di GitHub.",
                blocks: [
                    { type: 'badge', text: 'Terminal VPS' },
                    { type: 'text', content: "Buat kunci SSH baru di VPS. Tekan <strong>Enter</strong> terus menerus saat ditanya passphrase/password agar kunci tidak terenkripsi:" },
                    { type: 'code', language: 'bash', content: "ssh-keygen -t ed25519 -C \"vps-mysika\"\ncat ~/.ssh/id_ed25519.pub" },
                    { type: 'text', content: "Salin <strong>seluruh output teks</strong> yang berawalan <code>ssh-ed25519 ... vps-mysika</code>." },
                    { type: 'badge', text: 'Web GitHub' },
                    { type: 'text', content: "1. Buka <a href='https://github.com/dandienter/mysikea/settings/keys' target='_blank' class='text-cyan-400 hover:underline'>Settings > Deploy Keys di Repo Anda</a>.<br>2. Klik tombol <strong>Add deploy key</strong>.<br>3. Beri Title: <code>VPS-Prod</code>.<br>4. Paste kunci SSH tadi ke kolom Key.<br>5. <strong>PENTING: Centang kotak 'Allow write access'</strong>.<br>6. Klik Add key." },
                    { type: 'badge', text: 'Terminal VPS' },
                    { type: 'text', content: "Verifikasi koneksi VPS ke GitHub agar dikenali sebagai host yang aman:" },
                    { type: 'code', language: 'bash', content: "ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts\nssh -T git@github.com\n# Harus muncul pesan: Hi dandienter/mysikea! You've successfully authenticated..." }
                ],
                completed: false
            },
            {
                id: 3,
                title: "Kloning Repo & Setup Environment",
                env: "VPS",
                description: "Sekarang VPS sudah memiliki akses ke Private Repo. Mari kita kloning kodenya dan siapkan file konfigurasi (<code>.env</code>) agar Frontend terhubung ke domain yang benar.",
                blocks: [
                    { type: 'text', content: "Kloning repo menggunakan protokol SSH (bukan HTTPS) dan buat file .env:" },
                    { type: 'code', language: 'bash', content: "cd ~\n# Pastikan menggunakan format git@github.com untuk private repo\ngit clone git@github.com:dandienter/mysikea.git\ncd mysikea/frontend\n\n# Membuat file .env untuk Frontend React\ncat > .env << EOF\nREACT_APP_BACKEND_URL=https://mysika.my.id\nWDS_SOCKET_PORT=443\nREACT_APP_ENABLE_VISUAL_EDITS=false\nENABLE_HEALTH_CHECK=false\nDISABLE_ESLINT_PLUGIN=true\nEOF\n\n# Verifikasi isi file\ncat .env" }
                ],
                completed: false
            },
            {
                id: 4,
                title: "Deploy Backend Service (FastAPI)",
                env: "VPS",
                description: "Menjadikan backend FastAPI sebagai <em>Systemd Service</em>. Ini memastikan API selalu berjalan di <em>background</em> dan otomatis hidup kembali jika VPS mengalami <em>reboot</em>.",
                blocks: [
                    { type: 'text', content: "Salin blok ini. Skrip ini akan membuat file konfigurasi service dan langsung menyalakannya:" },
                    { type: 'code', language: 'bash', content: "sudo bash -c 'cat > /etc/systemd/system/fastapi.service << EOF\n[Unit]\nDescription=FastAPI MySIKA Production Service\nAfter=network.target\n\n[Service]\nUser=ubuntu\nGroup=ubuntu\nWorkingDirectory=/home/ubuntu/mysikea/backend\nExecStart=/usr/local/bin/uvicorn server:app --host 127.0.0.1 --port 8000 --proxy-headers --forwarded-allow-ips=\"*\"\nRestart=always\nRestartSec=3\n\n[Install]\nWantedBy=multi-user.target\nEOF'\n\n# Muat ulang systemd dan jalankan service\nsudo systemctl daemon-reload\nsudo systemctl enable fastapi\nsudo systemctl start fastapi\nsudo systemctl status fastapi --no-pager" }
                ],
                completed: false
            },
            {
                id: 5,
                title: "Ekspos Port via Cloudflare Tunnel",
                env: "VPS",
                description: "Menghubungkan aplikasi yang berjalan di localhost VPS langsung ke domain <code>mysika.my.id</code> secara aman tanpa perlu mengkonfigurasi Nginx atau membuka port di Firewall.",
                blocks: [
                    { type: 'text', content: "1. Install dan Login Cloudflared:" },
                    { type: 'code', language: 'bash', content: "curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb\nsudo dpkg -i cloudflared.deb\ncloudflared tunnel login" },
                    { type: 'text', content: "<em>(Buka link yang muncul di terminal pada browser, lalu otorisasi domain mysika.my.id)</em>" },
                    { type: 'text', content: "2. Buat tunnel dan arahkan DNS (<strong>Ganti &lt;ID_TUNNEL_KAMU&gt; dengan ID asli yang muncul!</strong>):" },
                    { type: 'code', language: 'bash', content: "cloudflared tunnel create mysika-prod\n# CATAT ID TUNNEL YANG MUNCUL DI LAYAR!\n\ncloudflared tunnel route dns mysika-prod mysika.my.id" },
                    { type: 'text', content: "3. Buat file konfigurasi ingress:" },
                    { type: 'code', language: 'bash', content: "mkdir -p ~/.cloudflared\ncat > ~/.cloudflared/config.yml << EOF\ntunnel: <ID_TUNNEL_KAMU>\ncredentials-file: /home/ubuntu/.cloudflared/<ID_TUNNEL_KAMU>.json\n\ningress:\n  - hostname: mysika.my.id\n    service: http://localhost:8000\n  - service: http_status:404\nEOF" },
                    { type: 'text', content: "4. Install sebagai service background:" },
                    { type: 'code', language: 'bash', content: "sudo cloudflared service install\nsudo systemctl start cloudflared\nsudo systemctl enable cloudflared" }
                ],
                completed: false
            },
            {
                id: 6,
                title: "Setup GitHub Actions Secrets",
                env: "GITHUB",
                description: "Agar GitHub Actions dapat me-remote VPS untuk melakukan Auto-Deploy, Anda harus menyimpan kredensial VPS dengan aman di pengaturan repository.",
                blocks: [
                    { type: 'text', content: "Buka menu <strong>Settings</strong> di repository GitHub > <strong>Secrets and variables</strong> > <strong>Actions</strong>. " },
                    { type: 'text', content: "Tambahkan 3 <em>New repository secret</em> berikut secara berurutan:" },
                    { type: 'badge', text: 'Secret 1' },
                    { type: 'text', content: "Name: <code>VPS_HOST</code><br>Secret: <em>(Masukkan IP Public VPS Anda)</em>" },
                    { type: 'badge', text: 'Secret 2' },
                    { type: 'text', content: "Name: <code>VPS_USERNAME</code><br>Secret: <code>ubuntu</code> <em>(Atau root jika menggunakan user root)</em>" },
                    { type: 'badge', text: 'Secret 3' },
                    { type: 'text', content: "Name: <code>VPS_PASSWORD</code><br>Secret: <em>(Masukkan password SSH VPS Anda)</em>" }
                ],
                completed: false
            },
            {
                id: 7,
                title: "Integrasi CI/CD Auto-Deploy",
                env: "LAPTOP",
                description: "Langkah terakhir! Memasukkan file alur kerja GitHub Actions. Script ini telah dioptimasi dengan <code>--no-audit --no-fund</code> dan penonaktifan ESLint agar VPS tidak kehabisan memori saat npm install.",
                blocks: [
                    { type: 'text', content: "Di VS Code/Local Laptop Anda, buat file dengan path <code>.github/workflows/deploy.yml</code> dan isi dengan kode ini:" },
                    { type: 'code', language: 'yaml', content: "name: Fast Deploy MySIKA\non:\n  push:\n    branches: [ main ]\njobs:\n  deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - name: SSH Deploy & Build\n        uses: appleboy/ssh-action@v1.0.3\n        with:\n          host: ${{ secrets.VPS_HOST }}\n          username: ${{ secrets.VPS_USERNAME }}\n          password: ${{ secrets.VPS_PASSWORD }}\n          script: |\n            export NVM_DIR=\"$HOME/.nvm\"\n            source \"$NVM_DIR/nvm.sh\"\n            nvm use 20\n\n            cd ~/mysikea\n            echo \"🔄 Pulling changes...\"\n            git pull origin main\n\n            echo \"🐍 Update Backend...\"\n            cd backend\n            pip install -r requirements.txt --disable-pip-version-check\n\n            echo \"📦 Fast NPM Install & Build...\"\n            cd ../frontend\n            # Install dependensi vital tanpa membebani memori\n            npm install ajv@^8 ajv-keywords@^5 --legacy-peer-deps --no-audit --no-fund\n            npm install --legacy-peer-deps --no-audit --no-fund\n            \n            # Inject ENV vars directly during build\n            REACT_APP_BACKEND_URL=\"https://mysika.my.id\" WDS_SOCKET_PORT=443 REACT_APP_ENABLE_VISUAL_EDITS=false ENABLE_HEALTH_CHECK=false DISABLE_ESLINT_PLUGIN=true CI=false npm run build\n\n            echo \"📂 Syncing Artifacts...\"\n            rm -rf ~/mysikea/backend/static\n            mv build ~/mysikea/backend/static\n\n            echo \"🚀 Restarting FastAPI...\"\n            sudo systemctl restart fastapi\n            echo \"✅ Deployment Complete!\"" },
                    { type: 'text', content: "Lakukan <code>git commit</code> dan <code>git push</code>. Buka tab <strong>Actions</strong> di GitHub untuk melihat proses deployment berjalan otomatis!" }
                ],
                completed: false
            }
        ];

        let currentStepId = 1;
        let progressChartInstance = null;

        // --- CORE LOGIC ---

        function initApp() {
            renderNavigation();
            renderStep(currentStepId);
            initChart();
            updateProgress();
            
            // Toggle complete listener
            document.getElementById('stepCompleteCheckbox').addEventListener('change', (e) => {
                const step = deploymentSteps.find(s => s.id === currentStepId);
                step.completed = e.target.checked;
                updateProgress();
                renderNavigation();
                
                const label = document.getElementById('toggleLabelText');
                label.innerText = step.completed ? 'Selesai' : 'Tertunda';
                
                // Add glow effect on completion
                const actionContainer = document.getElementById('stepCompleteCheckbox').closest('.glow-cyan');
                if(step.completed) {
                    actionContainer.classList.remove('glow-cyan');
                    actionContainer.classList.add('glow-emerald');
                } else {
                    actionContainer.classList.remove('glow-emerald');
                    actionContainer.classList.add('glow-cyan');
                }
            });
        }

        function renderNavigation() {
            const navList = document.getElementById('stepNavList');
            navList.innerHTML = '';
            
            deploymentSteps.forEach(step => {
                const isCurrent = step.id === currentStepId;
                
                let statusDot = step.completed ? 
                    '<div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>' : 
                    '<div class="w-2.5 h-2.5 rounded-full bg-slate-700"></div>';
                
                const li = document.createElement('li');
                li.className = `group flex items-center p-3 rounded-xl cursor-pointer transition-all duration-300 border-l-[3px] ${isCurrent ? 'bg-slate-800/80 shadow-md border-cyan-400 ml-1' : 'hover:bg-slate-800/40 border-transparent'}`;
                li.innerHTML = `
                    <div class="mr-3 flex-shrink-0 flex items-center justify-center w-5">
                        ${statusDot}
                    </div>
                    <div class="flex-1 min-w-0">
                        <span class="${isCurrent ? 'font-bold text-cyan-400' : 'font-medium text-slate-400 group-hover:text-slate-200'} text-sm block truncate transition-colors">
                            ${step.id}. ${step.title}
                        </span>
                    </div>
                `;
                li.onclick = () => renderStep(step.id);
                navList.appendChild(li);
            });
        }

        function renderStep(id) {
            currentStepId = id;
            const step = deploymentSteps.find(s => s.id === id);
            
            // Update Header Area
            document.getElementById('stepNumberBadge').innerText = `STEP ${step.id}`;
            document.getElementById('contentTitle').innerText = step.title;
            document.getElementById('contentDescription').innerHTML = step.description;
            
            // Env Badge
            const envData = envConfig[step.env];
            document.getElementById('envBadgeContainer').innerHTML = `
                <span class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-lg text-sm font-semibold border ${envData.color} shadow-sm">
                    ${envData.label}
                </span>
            `;
            
            // Update Toggle State
            const checkbox = document.getElementById('stepCompleteCheckbox');
            checkbox.checked = step.completed;
            document.getElementById('toggleLabelText').innerText = step.completed ? 'Selesai' : 'Tertunda';
            
            const actionContainer = checkbox.closest('.border-slate-800\\/80');
            if(step.completed) {
                actionContainer.classList.remove('glow-cyan');
                actionContainer.classList.add('glow-emerald');
            } else {
                actionContainer.classList.remove('glow-emerald');
                actionContainer.classList.add('glow-cyan');
            }

            // Hide Next button if it's the last step
            const nextBtn = document.getElementById('nextBtnContainer');
            nextBtn.style.display = (id === deploymentSteps.length) ? 'none' : 'flex';

            // Render Blocks
            let htmlContent = '';
            step.blocks.forEach((block, index) => {
                if (block.type === 'text') {
                    htmlContent += `<p class="text-slate-300 font-medium text-base">${block.content}</p>`;
                } else if (block.type === 'badge') {
                    htmlContent += `<div class="inline-block bg-slate-800 text-cyan-400 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wider border border-slate-700 shadow-sm mt-2">${block.text}</div>`;
                } else if (block.type === 'code') {
                    const codeId = `code-block-${id}-${index}`;
                    htmlContent += `
                        <div class="relative bg-[#090e17] rounded-xl shadow-2xl border border-slate-800/80 overflow-hidden my-4">
                            <div class="flex items-center justify-between px-4 py-2.5 bg-[#111827] border-b border-slate-800">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-rose-500/80"></div>
                                    <div class="w-3 h-3 rounded-full bg-amber-500/80"></div>
                                    <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
                                    <span class="ml-3 text-xs font-mono text-slate-500 uppercase tracking-widest">${block.language}</span>
                                </div>
                                <button onclick="copyCode('${codeId}')" class="text-xs bg-slate-800 hover:bg-cyan-600 text-slate-300 hover:text-white px-3 py-1.5 rounded-lg transition-all focus:outline-none flex items-center gap-2 border border-slate-700 font-medium">
                                    <span>&#128203;</span> Salin Kode
                                </button>
                            </div>
                            <pre class="p-5 overflow-x-auto text-[14px] text-cyan-100 font-mono leading-loose terminal-scroll"><code id="${codeId}">${escapeHtml(block.content)}</code></pre>
                        </div>
                    `;
                }
            });
            
            document.getElementById('contentBlocks').innerHTML = htmlContent;
            
            // Smooth scroll to top of content
            document.getElementById('mainScrollArea').scrollTo(0,0);
        }

        function goToNextStep() {
            if(currentStepId < deploymentSteps.length) {
                renderStep(currentStepId + 1);
            }
        }

        window.copyCode = function(elementId) {
            const codeText = document.getElementById(elementId).innerText;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(codeText).then(() => showToast());
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = codeText;
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); showToast(); } 
                catch (err) { console.error('Fallback error', err); }
                textArea.remove();
            }
        }

        function showToast() {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-8 bg-slate-800 text-emerald-400 px-6 py-4 rounded-xl shadow-2xl z-50 flex items-center gap-3 font-bold toast-animate border border-slate-700 text-sm tracking-wide';
            toast.innerHTML = `<span class="text-xl">&#10004;</span> KODE BERHASIL DISALIN`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function initChart() {
            const ctx = document.getElementById('miniProgressChart').getContext('2d');
            progressChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Selesai', 'Sisa'],
                    datasets: [{
                        data: [0, 1],
                        backgroundColor: ['#22d3ee', '#1e293b'], // Cyan 400, Slate 800
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    animation: { animateScale: true }
                }
            });
        }

        function updateProgress() {
            const completedCount = deploymentSteps.filter(s => s.completed).length;
            const totalCount = deploymentSteps.length;
            const pendingCount = totalCount - completedCount;
            const percentage = Math.round((completedCount / totalCount) * 100);

            // Update Progress Bar & Text
            document.getElementById('progressPercentage').innerText = `${percentage}%`;
            document.getElementById('progressBar').style.width = `${percentage}%`;
            
            const statusText = document.getElementById('statusText');
            if(percentage === 100) {
                statusText.innerText = "ALL SYSTEMS GO";
                statusText.className = "text-sm font-bold text-emerald-400 tracking-wider";
                document.getElementById('progressBar').classList.replace('from-cyan-500', 'from-emerald-500');
                document.getElementById('progressBar').classList.replace('to-blue-500', 'to-emerald-400');
                document.getElementById('progressBar').classList.replace('shadow-[0_0_10px_rgba(6,182,212,0.5)]', 'shadow-[0_0_15px_rgba(16,185,129,0.6)]');
            } else {
                statusText.innerText = "DEPLOYING...";
                statusText.className = "text-sm font-bold text-amber-400 tracking-wider animate-pulse";
                document.getElementById('progressBar').classList.replace('from-emerald-500', 'from-cyan-500');
                document.getElementById('progressBar').classList.replace('to-emerald-400', 'to-blue-500');
                document.getElementById('progressBar').classList.replace('shadow-[0_0_15px_rgba(16,185,129,0.6)]', 'shadow-[0_0_10px_rgba(6,182,212,0.5)]');
            }

            // Update Chart Data
            if (progressChartInstance) {
                progressChartInstance.data.datasets[0].data = [completedCount, pendingCount];
                // Change chart color on 100%
                progressChartInstance.data.datasets[0].backgroundColor[0] = percentage === 100 ? '#10b981' : '#22d3ee';
                progressChartInstance.update();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
